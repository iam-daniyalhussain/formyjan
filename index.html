<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Message ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background: radial-gradient(circle at bottom,#0b1d3a 0%,#020111 70%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
position:relative;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}

/* shooting stars */

.shooting-star{
position:absolute;
width:2px;
height:2px;
background:white;
box-shadow:0 0 6px white;
}

@keyframes shoot{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(-600px,300px);opacity:0;}
}

/* card */

.card{
background:rgba(255,255,255,0.95);
color:#333;
padding:30px;
border-radius:25px;
text-align:center;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
z-index:5;
}

h1{
color:#ff4d6d;
margin-bottom:10px;
}

p{
margin:15px 0;
line-height:1.6;
}

/* photo */

.photo{
width:160px;
height:160px;
border-radius:50%;
margin:20px auto;
position:relative;
}

.photo img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

/* pulsing heart */

.photo::after{
content:"💖";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
font-size:120px;
opacity:0.15;
animation:pulseHeart 2.5s infinite;
}

@keyframes pulseHeart{
0%{transform:translate(-50%,-50%) scale(0.9);opacity:0.15;}
50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.3;}
100%{transform:translate(-50%,-50%) scale(0.9);opacity:0.15;}
}

/* glowing ring button */

.button{
background:#ff4d6d;
color:white;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:40px;
cursor:pointer;
margin-top:20px;
position:relative;
z-index:2;
}

.button::before{
content:"";
position:absolute;
top:-8px;
left:-8px;
right:-8px;
bottom:-8px;
border-radius:50px;
border:2px solid #ff6b8b;
animation:ring 2s infinite;
}

@keyframes ring{
0%{transform:scale(1);opacity:0.7;}
70%{transform:scale(1.3);opacity:0;}
100%{opacity:0;}
}

.fireworks-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.rocket{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
box-shadow:0 0 15px gold;
}

.piece{
position:absolute;
pointer-events:none;
}

</style>

</head>

<body>

<div class="card">

<h1>For My Love ❤️</h1>

<p style="color:#ff4d6d;font-weight:bold;">
East to the west, My Jaan is the bestest
</p>

<p>
Hi My Zuina Wife ❤️<br><br>
Every day with you makes my world brighter.<br>
You make me smile, laugh and feel loved.<br><br>
I love you more than anything ✨
</p>

<div class="photo">
<img src="us.jpg">
</div>

<button class="button" onclick="startFireworks()">
Click for Surprise 🎆
</button>

</div>

<div id="fireworksContainer" class="fireworks-container"></div>

<audio id="boom" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2e3c4b3e9b.mp3"></audio>

<script>

/* stars */

for(let i=0;i<120;i++){
const s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=Math.random()*window.innerHeight+"px";
s.style.animationDelay=Math.random()*3+"s";
document.body.appendChild(s);
}

/* shooting stars */

function shootingStar(){

const star=document.createElement("div");

star.className="shooting-star";

star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight*0.4+"px";

star.style.animation="shoot 1.5s linear";

document.body.appendChild(star);

setTimeout(()=>star.remove(),1500);

}

setInterval(shootingStar,4000);

/* fireworks */

const container=document.getElementById("fireworksContainer");
const sound=document.getElementById("boom");

function spark(x,y){

const s=document.createElement("div");

s.style.position="absolute";
s.style.width="3px";
s.style.height="3px";
s.style.background="white";

s.style.left=x+"px";
s.style.top=y+"px";

container.appendChild(s);

setTimeout(()=>{
s.style.transition="0.6s";
s.style.opacity=0;
s.style.transform="scale(0)";
},10);

setTimeout(()=>s.remove(),600);

}

function rocket(tx,ty){

const sx=Math.random()*window.innerWidth;
const sy=window.innerHeight;

const r=document.createElement("div");

r.className="rocket";

r.style.left=sx+"px";
r.style.top=sy+"px";

container.appendChild(r);

const start=performance.now();

function frame(t){

const p=Math.min((t-start)/900,1);

const x=sx+(tx-sx)*p;
const y=sy+(ty-sy)*p;

r.style.left=x+"px";
r.style.top=y+"px";

spark(x,y);

if(p<1){

requestAnimationFrame(frame);

}else{

r.remove();

sound.currentTime=0;
sound.play();

explode(tx,ty);

}

}

requestAnimationFrame(frame);

}

function explode(x,y){

for(let i=0;i<30;i++){

const p=document.createElement("div");

p.textContent=Math.random()<0.5?"✨":"💖";

p.style.position="absolute";
p.style.left=x+"px";
p.style.top=y+"px";
p.style.fontSize="22px";

container.appendChild(p);

const a=Math.random()*Math.PI*2;
const d=120+Math.random()*180;

animate(p,x,y,x+Math.cos(a)*d,y+Math.sin(a)*d);

}

}

function animate(el,x,y,tx,ty){

const start=performance.now();

function frame(t){

const p=Math.min((t-start)/1600,1);

const px=x+(tx-x)*p;
const py=y+(ty-y)*p;

el.style.transform=`translate(${px-x}px,${py-y}px)`;

el.style.opacity=1-p;

if(p<1){

requestAnimationFrame(frame);

}else{

el.remove();

}

}

requestAnimationFrame(frame);

}

/* MERYEME finale */

function showName(){

const text="MERYEME";

const cx=window.innerWidth/2;
const cy=window.innerHeight*0.35;

for(let i=0;i<text.length;i++){

setTimeout(()=>{

const l=document.createElement("div");

l.textContent=text[i];

l.style.position="absolute";
l.style.left=cx+"px";
l.style.top=cy+"px";

l.style.fontSize="70px";
l.style.fontWeight="bold";
l.style.color="#ff85a2";

container.appendChild(l);

animate(l,cx,cy,cx-210+i*70,cy);

},i*200);

}

setTimeout(heartShape,1800);

}

function heartShape(){

const cx=window.innerWidth/2;
const cy=window.innerHeight*0.35;

for(let i=0;i<100;i++){

const t=i/100*2*Math.PI;

const hx=16*Math.pow(Math.sin(t),3);
const hy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

const h=document.createElement("div");

h.textContent="💖";

h.style.position="absolute";
h.style.left=cx+hx*18+"px";
h.style.top=cy+hy*18+"px";
h.style.fontSize="24px";

container.appendChild(h);

}

}

function startFireworks(){

container.innerHTML="";

let c=0;

function launch(){

if(c>=12){

setTimeout(showName,1200);
return;

}

rocket(
Math.random()*window.innerWidth,
Math.random()*window.innerHeight*0.6
);

c++;

setTimeout(launch,1200);

}

launch();

}

</script>

</body>
</html>
